<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPL League Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --bg: #efe4d1;
    --paper: rgba(255, 252, 248, 0.86);
    --paper-strong: #fffaf4;
    --line: rgba(140, 115, 84, 0.16);
    --line-strong: rgba(140, 115, 84, 0.26);
    --text: #473728;
    --muted: #9c8265;
    --accent: #ad8d63;
    --teal: #7ed9c2;
    --blue: #8cd0ff;
    --yellow: #ffd76d;
    --pink: #ffb6c7;
    --green: #c7f6d5;
    --shadow: 0 22px 40px rgba(118, 93, 64, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top right, rgba(255, 255, 255, 0.55), transparent 30%),
      radial-gradient(circle at top left, rgba(255, 245, 224, 0.7), transparent 22%),
      linear-gradient(180deg, #f2e7d6 0%, #ecdfcb 100%);
    color: var(--text);
    font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
  }

  input, select, button {
    font: inherit;
  }

  #root {
    min-height: 100vh;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useState } = React;

const DEFAULT_LEAGUE_INPUT = "822501";
const DEFAULT_API_BASE = "https://fantasy.premierleague.com/api";
const CHART_COLORS = [
  "#cf8952", "#67b39f", "#72b9ea", "#d3829f", "#e4ad55", "#8b7fe6", "#84c76b", "#e98e64",
  "#6db8c7", "#c59652", "#ea7d7d", "#8c9cdf", "#57a88e", "#bb6ba2", "#7f9b47", "#c3a15c",
  "#599dc2", "#d49f73", "#95b86f", "#a080d8"
];

const CHIP_LABELS = {
  "3xc": "Triple Captain",
  bboost: "Bench Boost",
  freehit: "Free Hit",
  wildcard: "Wildcard",
  manager: "Manager"
};

const POSITION_LABELS = {
  1: "GKP",
  2: "DEF",
  3: "MID",
  4: "FWD"
};

function parseLeagueId(value) {
  if (!value) return null;
  const trimmed = String(value).trim();
  const urlMatch = trimmed.match(/\/leagues\/(\d+)\//i);
  if (urlMatch) return urlMatch[1];
  return /^\d+$/.test(trimmed) ? trimmed : null;
}

function buildApiUrl(apiBase, path, query = {}) {
  const url = new URL(path, apiBase.endsWith("/") ? apiBase : apiBase + "/");
  Object.entries(query).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== "") {
      url.searchParams.set(key, value);
    }
  });
  return url.toString();
}

async function fetchJson(url) {
  const response = await fetch(url, { headers: { Accept: "application/json" } });
  if (!response.ok) {
    throw new Error("Request failed: " + response.status + " " + response.statusText);
  }
  return response.json();
}

async function fetchAllLeagueStandings(apiBase, leagueId) {
  let page = 1;
  let hasNext = true;
  let leagueMeta = null;
  const results = [];

  while (hasNext) {
    const payload = await fetchJson(
      buildApiUrl(apiBase, `leagues-classic/${leagueId}/standings/`, { page_standings: page })
    );
    leagueMeta = payload.league || leagueMeta;
    const standings = payload.standings || {};
    results.push(...(standings.results || []));
    hasNext = Boolean(standings.has_next);
    page += 1;
  }

  return { league: leagueMeta, results };
}

function getCurrentEvent(bootstrap) {
  const events = bootstrap.events || [];
  return events.find((event) => event.is_current) || events.find((event) => event.is_next) || null;
}

function getTrackedGameweeks(bootstrap, histories) {
  const finished = (bootstrap.events || [])
    .filter((event) => event.finished || event.is_current)
    .map((event) => event.id);
  const historyEvents = new Set();

  histories.forEach((history) => {
    (history.current || []).forEach((row) => {
      if (row.event) historyEvents.add(row.event);
    });
  });

  return Array.from(new Set([...finished, ...historyEvents])).sort((a, b) => a - b);
}

function createManagers(standingsResults, histories, picksPayloads) {
  return standingsResults.map((row, index) => ({
    entry: row.entry,
    playerName: row.player_name || "Unknown Manager",
    entryName: row.entry_name || "Unnamed Team",
    overallRank: row.rank || null,
    overallTotal: row.total || 0,
    history: histories[index] || { current: [] },
    picks: picksPayloads[index] || null
  }));
}

function buildTrendData(bootstrap, managers) {
  const gameweeks = getTrackedGameweeks(bootstrap, managers.map((manager) => manager.history));
  const timelineByManager = {};

  managers.forEach((manager) => {
    const byGw = {};
    (manager.history.current || []).forEach((row) => {
      byGw[row.event] = row;
    });
    timelineByManager[manager.entry] = gameweeks.map((gw) => {
      const row = byGw[gw];
      return row ? {
        gw,
        totalPoints: row.total_points,
        eventPoints: row.points,
        rank: null
      } : null;
    });
  });

  gameweeks.forEach((gw, index) => {
    const rows = managers
      .map((manager) => {
        const row = timelineByManager[manager.entry][index];
        return row ? { entry: manager.entry, totalPoints: row.totalPoints } : null;
      })
      .filter(Boolean)
      .sort((a, b) => b.totalPoints - a.totalPoints);

    let rank = 1;
    rows.forEach((row, rowIndex) => {
      if (rowIndex > 0 && row.totalPoints < rows[rowIndex - 1].totalPoints) {
        rank = rowIndex + 1;
      }
      timelineByManager[row.entry][index].rank = rank;
    });
  });

  return { gameweeks, timelineByManager };
}

function buildLiveElementMap(bootstrap, livePayload) {
  const teamsByCode = Object.fromEntries((bootstrap.teams || []).map((team) => [team.code, team.short_name]));
  const playerMeta = Object.fromEntries((bootstrap.elements || []).map((player) => [player.id, player]));
  const liveMap = {};

  (livePayload.elements || []).forEach((element) => {
    const meta = playerMeta[element.id] || {};
    liveMap[element.id] = {
      id: element.id,
      name: meta.web_name || ("Player #" + element.id),
      teamShort: teamsByCode[meta.team_code] || "",
      position: POSITION_LABELS[meta.element_type] || "",
      points: element.stats?.total_points || 0,
      minutes: element.stats?.minutes || 0
    };
  });

  return liveMap;
}

function buildPlayerCard(pick, liveMap) {
  const live = liveMap[pick.element] || {
    name: "Player #" + pick.element,
    teamShort: "",
    position: "",
    points: 0,
    minutes: 0
  };

  return {
    element: pick.element,
    name: live.name,
    subtitle: `${live.teamShort} / ${live.position}`.trim(),
    points: live.points,
    minutes: live.minutes,
    played: live.minutes > 0,
    captain: Boolean(pick.is_captain),
    viceCaptain: Boolean(pick.is_vice_captain),
    multiplier: pick.multiplier
  };
}

function buildManagerLiveSummary(manager, trendRow, liveMap) {
  const picks = manager.picks?.picks || [];
  const activeChip = manager.picks?.active_chip || "";
  const captainPick = picks.find((pick) => pick.is_captain);
  const playerCards = picks.map((pick) => buildPlayerCard(pick, liveMap));
  const starterCards = playerCards.filter((card) => card.multiplier > 0);
  const benchCards = playerCards.filter((card) => card.multiplier === 0);
  const gwPoints = picks.reduce((sum, pick) => {
    const live = liveMap[pick.element];
    return sum + ((live?.points || 0) * pick.multiplier);
  }, 0);

  return {
    ...manager,
    captainName: captainPick ? (liveMap[captainPick.element]?.name || `Player #${captainPick.element}`) : "-",
    chip: activeChip,
    chipLabel: activeChip ? (CHIP_LABELS[activeChip] || activeChip) : "-",
    playersPlayed: starterCards.filter((card) => card.played).length,
    gwPoints,
    totalPoints: trendRow?.totalPoints ?? manager.overallTotal,
    trendRow,
    startingXI: starterCards,
    bench: benchCards
  };
}

function buildCaptainSummary(managers) {
  const counts = {};
  managers.forEach((manager) => {
    if (!manager.captainName || manager.captainName === "-") return;
    counts[manager.captainName] = (counts[manager.captainName] || 0) + 1;
  });

  const totalManagers = managers.length || 1;
  return Object.entries(counts)
    .map(([name, count]) => ({ name, count, pct: ((count / totalManagers) * 100).toFixed(1) }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 3);
}

function formatRefreshTime() {
  const now = new Date();
  return new Intl.DateTimeFormat("ko-KR", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  }).format(now);
}

function getCardAccent(card) {
  if (card.captain) return "var(--pink)";
  if (card.position === "GKP") return "var(--yellow)";
  if (card.position === "MID") return "var(--teal)";
  if (card.position === "DEF") return "var(--blue)";
  return "var(--green)";
}

function buildLiveBonus(fixtures, bootstrap, liveMap) {
  const teams = Object.fromEntries((bootstrap.teams || []).map((team) => [team.id, team.name]));

  return (fixtures || [])
    .filter((fixture) => fixture.started && !fixture.finished)
    .map((fixture) => {
      const bpsStat = (fixture.stats || []).find((stat) => stat.identifier === "bps");
      const leaders = [
        ...((bpsStat?.h || []).map((item) => ({ element: item.element, value: item.value }))),
        ...((bpsStat?.a || []).map((item) => ({ element: item.element, value: item.value })))
      ]
        .sort((a, b) => b.value - a.value)
        .slice(0, 3)
        .map((player) => ({
          ...player,
          name: liveMap[player.element]?.name || ("Player #" + player.element)
        }));

      return {
        id: fixture.id,
        label: `${teams[fixture.team_h] || "Home"} vs ${teams[fixture.team_a] || "Away"}`,
        score: `${fixture.team_h_score ?? 0} - ${fixture.team_a_score ?? 0}`,
        minutes: fixture.minutes || 0,
        leaders
      };
    });
}

function LoadingPanel({ text }) {
  return (
    <div style={{
      padding: "34px",
      background: "var(--paper)",
      border: "1px solid var(--line)",
      borderRadius: "30px",
      textAlign: "center",
      color: "var(--muted)",
      boxShadow: "var(--shadow)"
    }}>
      {text}
    </div>
  );
}

function ErrorPanel({ message }) {
  return (
    <div style={{
      padding: "24px",
      borderRadius: "24px",
      border: "1px solid rgba(215, 123, 115, 0.3)",
      background: "rgba(255, 244, 242, 0.92)",
      color: "#9d4338",
      lineHeight: 1.65,
      boxShadow: "var(--shadow)"
    }}>
      <strong style={{ display: "block", marginBottom: "8px" }}>Data load failed</strong>
      <div>{message}</div>
      <div style={{ marginTop: "8px" }}>
        If this page is served from a different domain, you may need a proxy for fantasy.premierleague.com/api.
      </div>
    </div>
  );
}

function App() {
  const [leagueInput, setLeagueInput] = useState(DEFAULT_LEAGUE_INPUT);
  const [activeLeagueId, setActiveLeagueId] = useState(DEFAULT_LEAGUE_INPUT);
  const [apiBaseInput, setApiBaseInput] = useState(DEFAULT_API_BASE);
  const [apiBase, setApiBase] = useState(DEFAULT_API_BASE);
  const [reloadKey, setReloadKey] = useState(0);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [data, setData] = useState(null);
  const [searchText, setSearchText] = useState("");
  const [chipOnly, setChipOnly] = useState(false);
  const [scope, setScope] = useState("all");
  const [expandedEntry, setExpandedEntry] = useState(null);
  const [hoveredEntry, setHoveredEntry] = useState(null);

  useEffect(() => {
    loadLeague(activeLeagueId, apiBase);
  }, [activeLeagueId, apiBase, reloadKey]);

  async function loadLeague(leagueId, nextApiBase) {
    setLoading(true);
    setError("");

    try {
      const bootstrap = await fetchJson(buildApiUrl(nextApiBase, "bootstrap-static/"));
      const currentEvent = getCurrentEvent(bootstrap);
      const standingsPayload = await fetchAllLeagueStandings(nextApiBase, leagueId);
      const historyPayloads = await Promise.all(
        standingsPayload.results.map((row) => fetchJson(buildApiUrl(nextApiBase, `entry/${row.entry}/history/`)))
      );

      const picksPayloads = currentEvent
        ? await Promise.all(
            standingsPayload.results.map((row) => fetchJson(buildApiUrl(nextApiBase, `entry/${row.entry}/event/${currentEvent.id}/picks/`)))
          )
        : standingsPayload.results.map(() => null);

      const managers = createManagers(standingsPayload.results, historyPayloads, picksPayloads);
      const trendData = buildTrendData(bootstrap, managers);
      const livePayload = currentEvent
        ? await fetchJson(buildApiUrl(nextApiBase, `event/${currentEvent.id}/live/`))
        : { elements: [] };
      const liveMap = buildLiveElementMap(bootstrap, livePayload);

      const dashboardManagers = managers.map((manager, index) => {
        const trend = trendData.timelineByManager[manager.entry] || [];
        const filteredTrend = trend.filter(Boolean);
        const liveSummary = buildManagerLiveSummary(
          manager,
          filteredTrend.slice(-1)[0] || null,
          liveMap
        );

        return {
          ...liveSummary,
          color: CHART_COLORS[index % CHART_COLORS.length],
          trend,
          latest: filteredTrend.slice(-1)[0] || null,
          previous: filteredTrend.slice(-2, -1)[0] || null
        };
      }).sort((a, b) => (a.latest?.rank || 999) - (b.latest?.rank || 999));

      const fixtures = currentEvent
        ? await fetchJson(buildApiUrl(nextApiBase, "fixtures/", { event: currentEvent.id }))
        : [];

      setData({
        league: standingsPayload.league,
        currentEvent,
        gameweeks: trendData.gameweeks,
        managers: dashboardManagers,
        captainSummary: buildCaptainSummary(dashboardManagers),
        liveBonus: buildLiveBonus(fixtures, bootstrap, liveMap),
        refreshedAt: formatRefreshTime()
      });

      setExpandedEntry((current) => current || dashboardManagers[0]?.entry || null);
    } catch (err) {
      setData(null);
      setError(err.message || "Unknown error");
    } finally {
      setLoading(false);
    }
  }

  function handleSubmit(event) {
    event.preventDefault();
    const nextLeagueId = parseLeagueId(leagueInput);
    if (!nextLeagueId) {
      setError("League ID or league URL format is invalid.");
      return;
    }
    setApiBase(apiBaseInput.trim() || DEFAULT_API_BASE);
    setActiveLeagueId(nextLeagueId);
    setReloadKey((value) => value + 1);
  }

  const allManagers = data?.managers || [];
  const filteredManagers = allManagers.filter((manager) => {
    const haystack = [manager.playerName, manager.entryName, manager.captainName].join(" ").toLowerCase();
    const matchesSearch = !searchText.trim() || haystack.includes(searchText.trim().toLowerCase());
    const matchesChip = !chipOnly || manager.chip !== "";
    return matchesSearch && matchesChip;
  });

  const scopedManagers = scope === "top10"
    ? filteredManagers.slice(0, 10)
    : scope === "top20"
      ? filteredManagers.slice(0, 20)
      : filteredManagers;

  const expandedManager = scopedManagers.find((manager) => manager.entry === expandedEntry) || scopedManagers[0] || null;
  const gameweeks = data?.gameweeks || [];
  const maxRank = Math.max(allManagers.length, 1);
  const chartWidth = 1080;
  const chartHeight = 420;
  const padding = { top: 26, right: 24, bottom: 44, left: 44 };
  const innerWidth = chartWidth - padding.left - padding.right;
  const innerHeight = chartHeight - padding.top - padding.bottom;
  const stepX = gameweeks.length > 1 ? innerWidth / (gameweeks.length - 1) : 0;

  function getX(index) {
    return padding.left + stepX * index;
  }

  function getY(rank) {
    if (maxRank === 1) return padding.top + innerHeight / 2;
    return padding.top + ((rank - 1) / (maxRank - 1)) * innerHeight;
  }

  return (
    <div style={{ maxWidth: "1320px", margin: "0 auto", padding: "18px 10px 36px" }}>
      <div style={{
        padding: "18px 14px 22px",
        borderRadius: "34px",
        background: "rgba(255, 249, 241, 0.44)"
      }}>
        <header style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "18px", flexWrap: "wrap", marginBottom: "18px" }}>
          <div>
            <div style={{ color: "var(--muted)", fontSize: "12px", textTransform: "uppercase", letterSpacing: "0.16em", marginBottom: "4px" }}>
              Search another league
            </div>
            <div style={{ fontSize: "20px", fontWeight: "800" }}>
              {data?.league?.name || `League ${activeLeagueId}`}
            </div>
            <div style={{ color: "var(--muted)", marginTop: "2px" }}>
              {data?.currentEvent ? `Gameweek ${data.currentEvent.id} live dashboard` : "Season dashboard"}
            </div>
          </div>

          <div style={{
            minWidth: "210px",
            padding: "16px 18px",
            borderRadius: "20px",
            background: "var(--paper-strong)",
            border: "1px solid var(--line)",
            boxShadow: "var(--shadow)",
            textAlign: "right"
          }}>
            <div style={{ fontSize: "13px", color: "var(--muted)" }}>Live scores recalculate on each refresh.</div>
            <div style={{ marginTop: "6px", fontSize: "11px", color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.08em" }}>
              Refreshed {data?.refreshedAt || "-"}
            </div>
          </div>
        </header>

        <form onSubmit={handleSubmit} style={{ marginBottom: "14px" }}>
          <div style={{
            display: "grid",
            gridTemplateColumns: "minmax(220px, 1.2fr) minmax(220px, 1fr) auto",
            gap: "10px"
          }}>
            <input
              value={leagueInput}
              onChange={(event) => setLeagueInput(event.target.value)}
              placeholder="822501 or full league URL"
              style={{
                width: "100%",
                padding: "14px 18px",
                borderRadius: "999px",
                border: "1px solid var(--line)",
                background: "var(--paper-strong)",
                color: "var(--text)"
              }}
            />
            <input
              value={apiBaseInput}
              onChange={(event) => setApiBaseInput(event.target.value)}
              placeholder="https://fantasy.premierleague.com/api"
              style={{
                width: "100%",
                padding: "14px 18px",
                borderRadius: "999px",
                border: "1px solid var(--line)",
                background: "var(--paper-strong)",
                color: "var(--text)"
              }}
            />
            <button
              type="submit"
              style={{
                padding: "14px 18px",
                borderRadius: "999px",
                border: "1px solid rgba(173, 141, 99, 0.35)",
                background: "#f3e0bf",
                color: "var(--text)",
                fontWeight: "700",
                cursor: "pointer"
              }}
            >
              Load
            </button>
          </div>
        </form>

        {loading && <LoadingPanel text="Loading league standings, current picks, live scores, and rank history..." />}
        {!loading && error && <ErrorPanel message={error} />}
        {!loading && !error && data && (
          <div style={{ display: "grid", gap: "14px" }}>
            <section style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))",
              gap: "12px",
              padding: "16px",
              background: "var(--paper)",
              border: "1px solid var(--line)",
              borderRadius: "24px",
              boxShadow: "var(--shadow)"
            }}>
              {data.captainSummary.map((captain, index) => (
                <div key={captain.name} style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                  <div style={{
                    width: "34px",
                    height: "34px",
                    borderRadius: "50%",
                    background: index === 0 ? "#eedbc1" : "#f3e7d7",
                    display: "grid",
                    placeItems: "center",
                    color: "var(--accent)",
                    fontWeight: "700",
                    fontSize: "11px"
                  }}>
                    {captain.name.slice(0, 2).toUpperCase()}
                  </div>
                  <div>
                    <div style={{ fontSize: "12px", color: "var(--muted)" }}>{index === 0 ? "Top 3 Captain Picks" : "\u00A0"}</div>
                    <div style={{ fontWeight: "700" }}>{captain.name}</div>
                    <div style={{ fontSize: "12px", color: "var(--muted)" }}>{captain.pct}%</div>
                  </div>
                </div>
              ))}
            </section>

            <section style={{
              padding: "10px",
              background: "var(--paper)",
              border: "1px solid var(--line)",
              borderRadius: "24px",
              boxShadow: "var(--shadow)"
            }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "10px", alignItems: "center" }}>
                <input
                  value={searchText}
                  onChange={(event) => setSearchText(event.target.value)}
                  placeholder="Search manager or team"
                  style={{
                    width: "100%",
                    padding: "13px 16px",
                    borderRadius: "999px",
                    border: "1px solid var(--line)",
                    background: "var(--paper-strong)",
                    color: "var(--text)"
                  }}
                />

                <label style={{ display: "flex", alignItems: "center", gap: "8px", color: "var(--muted)", fontSize: "14px", whiteSpace: "nowrap" }}>
                  <input type="checkbox" checked={chipOnly} onChange={(event) => setChipOnly(event.target.checked)} />
                  Chip used
                </label>

                <select
                  value={scope}
                  onChange={(event) => setScope(event.target.value)}
                  style={{
                    padding: "11px 14px",
                    borderRadius: "999px",
                    border: "1px solid var(--line)",
                    background: "var(--paper-strong)",
                    color: "var(--text)"
                  }}
                >
                  <option value="all">ALL</option>
                  <option value="top10">TOP 10</option>
                  <option value="top20">TOP 20</option>
                </select>
              </div>
            </section>

            <section style={{
              background: "var(--paper)",
              border: "1px solid var(--line)",
              borderRadius: "28px",
              boxShadow: "var(--shadow)",
              overflow: "hidden"
            }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", minWidth: "920px" }}>
                  <thead>
                    <tr style={{ borderBottom: "1px solid var(--line-strong)", color: "var(--muted)", fontSize: "12px" }}>
                      <th style={{ textAlign: "left", padding: "12px 14px" }}>Rank</th>
                      <th style={{ textAlign: "left", padding: "12px 14px" }}>Team</th>
                      <th style={{ textAlign: "left", padding: "12px 14px" }}>Manager</th>
                      <th style={{ textAlign: "left", padding: "12px 14px" }}>Captain</th>
                      <th style={{ textAlign: "left", padding: "12px 14px" }}>Chip</th>
                      <th style={{ textAlign: "right", padding: "12px 14px" }}>Players Played</th>
                      <th style={{ textAlign: "right", padding: "12px 14px" }}>GW Points</th>
                      <th style={{ textAlign: "right", padding: "12px 14px" }}>Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {scopedManagers.map((manager) => (
                      <tr
                        key={manager.entry}
                        style={{
                          borderBottom: "1px solid rgba(140, 115, 84, 0.08)",
                          background: manager.entry === expandedEntry ? "rgba(255, 250, 244, 0.98)" : "transparent",
                          cursor: "pointer"
                        }}
                        onClick={() => setExpandedEntry(manager.entry)}
                      >
                        <td style={{ padding: "12px 14px", fontWeight: "700" }}>{manager.latest?.rank || manager.overallRank}</td>
                        <td style={{ padding: "12px 14px", fontWeight: "600" }}>{manager.entryName}</td>
                        <td style={{ padding: "12px 14px" }}>{manager.playerName}</td>
                        <td style={{ padding: "12px 14px" }}>{manager.captainName}</td>
                        <td style={{ padding: "12px 14px", color: manager.chip === "-" ? "var(--muted)" : "var(--accent)" }}>{manager.chipLabel}</td>
                        <td style={{ padding: "12px 14px", textAlign: "right" }}>{manager.playersPlayed}</td>
                        <td style={{ padding: "12px 14px", textAlign: "right", fontWeight: "700" }}>{manager.gwPoints}</td>
                        <td style={{ padding: "12px 14px", textAlign: "right", fontWeight: "700" }}>{manager.totalPoints}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {expandedManager && (
                <div style={{ padding: "16px 14px 18px", borderTop: "1px solid rgba(140, 115, 84, 0.08)" }}>
                  <div style={{ marginBottom: "10px", color: "var(--muted)", fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.14em" }}>
                    Starting XI
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(138px, 1fr))", gap: "10px" }}>
                    {expandedManager.startingXI.map((card) => (
                      <div key={`start-${card.element}`} style={{
                        padding: "12px",
                        background: "var(--paper-strong)",
                        borderRadius: "18px",
                        border: "1px solid var(--line)",
                        boxShadow: "0 10px 24px rgba(118, 93, 64, 0.05)",
                        borderLeft: `4px solid ${getCardAccent(card)}`
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", gap: "8px", alignItems: "baseline" }}>
                          <div style={{ fontWeight: "700" }}>{card.name}</div>
                          <div style={{ fontWeight: "800", color: "var(--accent)" }}>{card.points} pts</div>
                        </div>
                        <div style={{ marginTop: "4px", fontSize: "12px", color: "var(--muted)" }}>
                          {card.subtitle} {card.minutes > 0 ? `${card.minutes}'` : "0'"}
                        </div>
                        <div style={{ marginTop: "10px", display: "flex", justifyContent: "space-between", gap: "6px", alignItems: "center" }}>
                          <span style={{
                            fontSize: "11px",
                            padding: "4px 8px",
                            borderRadius: "999px",
                            background: card.played ? "var(--green)" : "#f1f1f1",
                            color: card.played ? "#2b7a57" : "#999"
                          }}>
                            {card.played ? "played" : "not played"}
                          </span>
                          <span style={{ fontSize: "11px", color: "var(--muted)" }}>
                            {card.captain ? "(C)" : card.viceCaptain ? "(VC)" : ""}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{ margin: "18px 0 10px", color: "var(--muted)", fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.14em" }}>
                    Bench
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(138px, 1fr))", gap: "10px" }}>
                    {expandedManager.bench.map((card) => (
                      <div key={`bench-${card.element}`} style={{
                        padding: "12px",
                        background: "var(--paper-strong)",
                        borderRadius: "18px",
                        border: "1px solid var(--line)",
                        borderLeft: `4px solid ${getCardAccent(card)}`
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", gap: "8px", alignItems: "baseline" }}>
                          <div style={{ fontWeight: "700" }}>{card.name}</div>
                          <div style={{ fontWeight: "800", color: "var(--accent)" }}>{card.points} pts</div>
                        </div>
                        <div style={{ marginTop: "4px", fontSize: "12px", color: "var(--muted)" }}>
                          {card.subtitle} {card.minutes > 0 ? `${card.minutes}'` : "0'"}
                        </div>
                        <div style={{ marginTop: "10px" }}>
                          <span style={{
                            fontSize: "11px",
                            padding: "4px 8px",
                            borderRadius: "999px",
                            background: card.played ? "var(--green)" : "#f1f1f1",
                            color: card.played ? "#2b7a57" : "#999"
                          }}>
                            {card.played ? "played" : "not played"}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </section>

            <section style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: "14px" }}>
              <div style={{
                padding: "16px",
                background: "var(--paper)",
                border: "1px solid var(--line)",
                borderRadius: "28px",
                boxShadow: "var(--shadow)"
              }}>
                <div style={{ marginBottom: "10px" }}>
                  <div style={{ fontSize: "18px", fontWeight: "800" }}>Season rank trend</div>
                  <div style={{ color: "var(--muted)", fontSize: "13px" }}>GW1 to current overall league rank path</div>
                </div>

                <div style={{ overflowX: "auto" }}>
                  <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} width="100%" style={{ minWidth: "920px", borderRadius: "20px", background: "rgba(255, 250, 244, 0.96)" }}>
                    {Array.from({ length: Math.min(maxRank, 12) }, (_, index) => (
                      <g key={`rank-${index}`}>
                        <line x1={padding.left} y1={getY(index + 1)} x2={chartWidth - padding.right} y2={getY(index + 1)} stroke="rgba(140, 115, 84, 0.08)" />
                        <text x={18} y={getY(index + 1) + 4} fill="var(--muted)" fontSize="11">#{index + 1}</text>
                      </g>
                    ))}

                    {gameweeks.map((gw, index) => (
                      <g key={`gw-${gw}`}>
                        <line x1={getX(index)} y1={padding.top} x2={getX(index)} y2={chartHeight - padding.bottom} stroke="rgba(140, 115, 84, 0.07)" strokeDasharray="3 5" />
                        <text x={getX(index)} y={chartHeight - 14} fill="var(--muted)" fontSize="10" textAnchor="middle">
                          GW{gw}
                        </text>
                      </g>
                    ))}

                    {allManagers.map((manager) => {
                      const points = manager.trend
                        .map((row, index) => row ? { x: getX(index), y: getY(row.rank), gw: row.gw, total: row.totalPoints } : null)
                        .filter(Boolean);
                      if (!points.length) return null;

                      const active = hoveredEntry === null || hoveredEntry === manager.entry;
                      const opacity = active ? 1 : 0.12;
                      const strokeWidth = hoveredEntry === manager.entry ? 3.5 : 1.8;
                      const path = points.map((point, index) => `${index === 0 ? "M" : "L"}${point.x},${point.y}`).join(" ");

                      return (
                        <g key={manager.entry}>
                          <path
                            d={path}
                            fill="none"
                            stroke={manager.color}
                            strokeWidth={strokeWidth}
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            opacity={opacity}
                            style={{ cursor: "pointer" }}
                            onMouseEnter={() => setHoveredEntry(manager.entry)}
                            onMouseLeave={() => setHoveredEntry(null)}
                          />
                          {hoveredEntry === manager.entry && points.map((point) => (
                            <g key={`${manager.entry}-${point.gw}`}>
                              <circle cx={point.x} cy={point.y} r="4.2" fill={manager.color} />
                              <text x={point.x} y={point.y - 10} fill={manager.color} fontSize="10" fontWeight="700" textAnchor="middle">
                                {point.total}
                              </text>
                            </g>
                          ))}
                        </g>
                      );
                    })}
                  </svg>
                </div>
              </div>

              <div style={{ display: "grid", gap: "14px" }}>
                <div style={{
                  padding: "16px",
                  background: "var(--paper)",
                  border: "1px solid var(--line)",
                  borderRadius: "28px",
                  boxShadow: "var(--shadow)"
                }}>
                  <div style={{ fontSize: "18px", fontWeight: "800" }}>Live bonus race</div>
                  <div style={{ color: "var(--muted)", fontSize: "13px", marginTop: "4px" }}>Top BPS leaders by live fixture</div>
                  <div style={{ display: "grid", gap: "10px", marginTop: "14px" }}>
                    {data.liveBonus.length === 0 && (
                      <div style={{ color: "var(--muted)", lineHeight: 1.6 }}>
                        No live fixture bonus data is available right now.
                      </div>
                    )}
                    {data.liveBonus.map((fixture) => (
                      <div key={fixture.id} style={{
                        padding: "12px",
                        borderRadius: "18px",
                        background: "var(--paper-strong)",
                        border: "1px solid var(--line)"
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", gap: "8px", marginBottom: "8px" }}>
                          <div style={{ fontWeight: "700" }}>{fixture.label}</div>
                          <div style={{ color: "var(--accent)", fontWeight: "700" }}>{fixture.score} / {fixture.minutes}'</div>
                        </div>
                        <div style={{ display: "grid", gap: "6px" }}>
                          {fixture.leaders.map((leader) => (
                            <div key={`${fixture.id}-${leader.element}`} style={{ display: "flex", justifyContent: "space-between", gap: "10px", fontSize: "13px" }}>
                              <span>{leader.name}</span>
                              <span style={{ color: "var(--muted)" }}>{leader.value} BPS</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{
                  padding: "16px",
                  background: "var(--paper)",
                  border: "1px solid var(--line)",
                  borderRadius: "28px",
                  boxShadow: "var(--shadow)"
                }}>
                  <div style={{ fontSize: "18px", fontWeight: "800" }}>API sources</div>
                  <div style={{ display: "grid", gap: "8px", marginTop: "12px", color: "var(--muted)", fontSize: "13px" }}>
                    <div>{"/api/leagues-classic/{leagueId}/standings/"}</div>
                    <div>{"/api/entry/{entryId}/history/"}</div>
                    <div>{"/api/entry/{entryId}/event/{gw}/picks/"}</div>
                    <div>{"/api/event/{gw}/live/"}</div>
                    <div>{"/api/bootstrap-static/"}</div>
                    <div>{"/api/fixtures/?event={gw}"}</div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
